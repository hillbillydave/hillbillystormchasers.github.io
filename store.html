<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store – Hillbilly Storm Chasers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- ⭐ REQUIRED PayPal Cart Script -->
  <script src="https://www.paypalobjects.com/ncp/cart/cart.js" data-merchant-id="3G56YQSBLK6S6"></script>

  <style>
    /* ⭐ PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin: 20px;
    }

    /* ⭐ PRODUCT ITEM BOX */
    .product-item {
      background: #111;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      color: #eee;
    }

    /* ⭐ IMAGE SLIDER */
    .image-slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 10px;
    }

    .image-slider img {
      width: 200px;
      height: auto;
      border-radius: 6px;
      scroll-snap-align: center;
      flex-shrink: 0;
    }

    .image-slider::-webkit-scrollbar {
      display: none;
    }

    nav {
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    nav a {
      color: #00aaff;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1 class="header-title">Hillbilly Storm Chasers</h1>
</header>

<nav>
  <a href="index.html">Home</a> |
  <a href="gallery.html">Gallery</a> |
  <a href="research.html">Research Division</a> |
  <a href="support.html">Support</a> |
  <a href="contact.html">Contact</a> |
  <a href="store.html">Store</a> |
  <a href="merch.html">Mission</a> |
  <a href="https://hillbillystormchasers.blogspot.com/" target="_blank">Blog</a> |
  <a href="https://www.facebook.com/HillbillyStormChasers" target="_blank">Facebook</a> |
  <a href="https://independent.academia.edu/DavidBlackwell35" target="_blank">Academia.edu</a>
</nav>

<!-- ⭐ View Cart Button -->
<div style="text-align:center; margin-bottom:20px;">
  <paypal-cart-button data-id="pp-view-cart"></paypal-cart-button>
  <script>
    cartPaypal.Cart({ id: "pp-view-cart" })
  </script>
</div>

<!-- ⭐ PRODUCT GRID -->
<div class="product-grid">

  <!-- ⭐ BLACK KNIFE -->
  <div class="product-item">
  
    <paypal-add-to-cart-button data-id="HQQU3UVEMF8FL"></paypal-add-to-cart-button>
    <script>
      cartPaypal.AddToCart({ id: "HQQU3UVEMF8FL" })
    </script>
  </div>

  <!-- ⭐ GRAY KNIFE -->
  <div class="product-item">
    

    <paypal-add-to-cart-button data-id="RBVWJA64PD65Y"></paypal-add-to-cart-button>
    <script>
      cartPaypal.AddToCart({ id: "RBVWJA64PD65Y" })
    </script>
  </div>

</div>

</body>
</html>
