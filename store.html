<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store – Hillbilly Storm Chasers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- ⭐ REQUIRED PayPal Cart Script -->
  <script src="https://www.paypalobjects.com/ncp/cart/cart.js" data-merchant-id="3G56YQSBLK6S6"></script>

  <style>
    :root{
      color-scheme: dark;
      --bg:#020617;
      --card:#020617;
      --border:#1f2937;
      --accent:#fbbf24;
      --accent-soft:#facc15;
      --text:#e5e7eb;
      --muted:#9ca3af;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:radial-gradient(circle at top,#111827 0,#020617 55%,#000 100%);
      color:var(--text);
      line-height:1.6;
      min-height:100vh;
    }
    a{color:var(--accent-soft);text-decoration:none}
    a:hover{text-decoration:underline}

    /* TOP NAV */
    .site-nav{
      background:#020617;
      border-bottom:1px solid rgba(31,41,55,.9);
      padding:8px 10px;
      text-align:center;
      font-size:13px;
      position:sticky;
      top:0;
      z-index:40;
    }
    .site-nav a{
      color:var(--muted);
      margin:0 4px;
      white-space:nowrap;
    }
    .site-nav a:hover{
      color:var(--accent-soft);
    }

    /* HEADER */
    header{
      padding:12px 18px 10px;
      border-bottom:1px solid rgba(15,23,42,.8);
      background:linear-gradient(135deg,rgba(15,23,42,.96),rgba(8,47,73,.96));
      position:sticky;
      top:32px;
      z-index:30;
      backdrop-filter:blur(10px);
    }
    #brand{
      font-size:20px;
      font-weight:600;
      color:var(--accent-soft);
      text-shadow:0 0 10px rgba(0,0,0,.7);
    }
    header .row{
      display:flex;
      gap:8px;
      margin-top:8px;
      justify-content:flex-end;
    }

    button{
      cursor:pointer;
      background:linear-gradient(135deg,#fbbf24,#f97316);
      border:none;
      color:#111827;
      font-weight:600;
      padding:6px 12px;
      border-radius:999px;
      box-shadow:0 0 12px rgba(251,191,36,.35);
    }
    button:hover{
      transform:translateY(-1px);
      box-shadow:0 0 16px rgba(251,191,36,.5);
    }
    .hidden{display:none!important;}

    .container{
      max-width:960px;
      margin:0 auto;
      padding:18px 18px 40px;
    }

    /* SUBNAV */
    nav.subnav{
      margin-top:18px;
      padding:10px;
      border-radius:999px;
      border:1px solid rgba(31,41,55,.9);
      background:rgba(15,23,42,.96);
      display:flex;
      gap:6px;
      justify-content:space-between;
      position:sticky;
      top:82px;
      z-index:25;
      backdrop-filter:blur(10px);
    }
    nav.subnav a{
      flex:1;
      text-align:center;
      padding:8px 6px;
      font-size:13px;
      border-radius:999px;
      color:var(--muted);
      border:1px solid transparent;
    }
    nav.subnav a.active{
      background:radial-gradient(circle at top,#fbbf24,#f97316);
      color:#111827;
      font-weight:600;
      box-shadow:0 0 14px rgba(251,191,36,.45);
    }

    @media(max-width:700px){
      nav.subnav{
        position:fixed;
        left:0;right:0;bottom:0;
        border-radius:0;
        border-top:1px solid rgba(51,65,85,.7);
      }
      .container{padding:14px 14px 80px;}
    }

    /* PRODUCT GRID */
    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .product-item{
      background:rgba(15,23,42,.96);
      border-radius:16px;
      border:1px solid rgba(31,41,55,.9);
      padding:16px;
      text-align:center;
      color:var(--text);
      box-shadow:0 10px 30px rgba(0,0,0,.7);
    }

    .image-slider{
      display:flex;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      gap:10px;
      margin-bottom:10px;
    }
    .image-slider img{
      width:200px;
      border-radius:8px;
      scroll-snap-align:center;
      flex-shrink:0;
    }
    .image-slider::-webkit-scrollbar{display:none;}

    footer{
      text-align:center;
      padding:16px 10px 26px;
      font-size:12px;
      color:var(--muted);
      border-top:1px solid rgba(15,23,42,.9);
      margin-top:10px;
      background:rgba(3,7,18,.98);
    }
  </style>
</head>

<body>

<!-- SITE-WIDE NAV -->
<nav class="site-nav">
  <a href="index.html">Home</a> |
  <a href="gallery.html">Gallery</a> |
  <a href="research.html">Research Division</a> |
  <a href="support.html">Support</a> |
  <a href="contact.html">Contact</a> |
  <a href="store.html">Store</a> |
  <a href="merch.html">Mission</a> |
  <a href="services.html">Services</a> |
  <a href="ministry.html">Ministry</a> |
  <a href="https://hillbillystormchasers.blogspot.com/" target="_blank">Blog</a> |
  <a href="https://www.facebook.com/HillbillyStormChasers" target="_blank">Facebook</a> |
  <a href="https://independent.academia.edu/DavidBlackwell35" target="_blank">Academia.edu</a>
</nav>

<header>
  <div id="brand">Store</div>
  <div class="row">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" class="hidden">Logout</button>
  </div>
</header>

<!-- STORE SUBNAV -->
<nav class="subnav">
  <a id="navKnives" class="active">Knives</a>
  <a id="navComing">Coming Soon</a>
  <a id="navHome">Home</a>
</nav>

<div class="container">

  <!-- CART BUTTON -->
  <div style="text-align:right;margin-bottom:20px;">
    <paypal-cart-button data-id="pp-view-cart"></paypal-cart-button>
    <script>cartPaypal.Cart({ id:"pp-view-cart" })</script>
  </div>

  <!-- KNIVES -->
  <section id="knives" class="view">
    <div class="product-grid">

      <!-- BLACK KNIFE -->
      <div class="product-item">
        <div class="image-slider">
          <img src="store_photos/IMG_20260503_234104629.jpg">
          <img src="store_photos/IMG_20260503_234150993.jpg">
        </div>
        <paypal-add-to-cart-button data-id="HQQU3UVEMF8FL"></paypal-add-to-cart-button>
        <script>cartPaypal.AddToCart({ id:"HQQU3UVEMF8FL" })</script>
      </div>

      <!-- GRAY KNIFE -->
      <div class="product-item">
        <div class="image-slider">
          <img src="store_photos/gray1.jpg">
          <img src="store_photos/gray2.jpg">
        </div>
        <paypal-add-to-cart-button data-id="RBVWJA64PD65Y"></paypal-add-to-cart-button>
        <script>cartPaypal.AddToCart({ id:"RBVWJA64PD65Y" })</script>
      </div>

    </div>
  </section>

  <!-- COMING SOON -->
  <section id="coming" class="view hidden">
    <div class="product-item" style="font-size:1.3em;font-weight:bold;opacity:0.7;text-align:center;">
      More Items Coming Soon
    </div>
  </section>

  <!-- HOME -->
  <section id="home" class="view hidden">
    <div class="card">
      <h2>Return Home</h2>
      <p><a href="index.html">Back to Home</a></p>
    </div>
  </section>

</div>

<script>
  /* SUBNAV VIEW SWITCHING */
  const views = {
    knives: document.getElementById('knives'),
    coming: document.getElementById('coming'),
    home: document.getElementById('home')
  };

  const navLinks = {
    knives: document.getElementById('navKnives'),
    coming: document.getElementById('navComing'),
    home: document.getElementById('navHome')
  };

  function switchView(name){
    Object.keys(views).forEach(k=>{
      views[k].classList.toggle('hidden', k !== name);
    });
    Object.keys(navLinks).forEach(k=>{
      navLinks[k].classList.toggle('active', k === name);
    });
  }

  navLinks.knives.onclick = ()=>switchView('knives');
  navLinks.coming.onclick = ()=>switchView('coming');
  navLinks.home.onclick = ()=>switchView('home');

  /* LOGIN SYSTEM */
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');

  loginBtn.onclick = ()=>{
    const email = prompt("Email:");
    const pass = prompt("Password:");
    if(email && pass){
      localStorage.setItem('hsc_user', email);
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
    }
  };

  logoutBtn.onclick = ()=>{
    localStorage.removeItem('hsc_user');
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
  };

  (function init(){
    if(localStorage.getItem('hsc_user')){
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
    }
  })();
</script>

<footer>
  © 2026 Hillbilly Storm Chasers — All Rights Reserved
</footer>

</body>
</html>
